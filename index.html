    <header>

                <li><a href="#photos">Фото</a></li>
            </ul>
        </nav>


    </header>
    <main>
        <div class="intro">
            <img src="beautiful-viewpoint-koh-nangyuan-island-surat-thani-thailand.jpg" alt="Балі" width="100%" height="600px">

        <div class="title"
            <h1>Незабутні подорожі на Балі</h1>

                <img src="3127363.png" alt="Квиток">

            </div>
            <div class="ticket-gold">
                <h3>Золотий квиток</h3>

        <section id="photos">

            <div class="photo-gallery">
                <img src="images.jpg" width="350" height="500" alt="Фото 1">
                <img src="images (1).jpg" width="350" height="500" alt="Фото 2">
                <img src="fullsize.jpg" width="350" height="500" alt="Фото 3">
                <img src="o_1fg1bdnhk5ha1d07vh21pp732j1r.jpg" width="350" height="500" alt="Фото 4">

    <footer
        <div class="contact-info">
            <p>Контактна інформація:</p>
