<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подорож на Балі</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


<header>
    <h2 class="logo">Bali Travel</h2>
    <nav>
        <ul>
            <li><a href="#map">Карта</a></li>
            <li><a href="#tickets">Квитки</a></li>
            <li><a href="#photos">Фото</a></li>
        </ul>
    </nav>
</header>


<main>


    <section class="hero">
        <img src="beautiful-viewpoint-koh-nangyuan-island-surat-thani-thailand.jpg" alt="Балі">
        <div class="title">
            <h1>Незабутні подорожі на Балі</h1>
        </div>
    </section>


    <section id="map">
        <h2>Карта</h2>
        <iframe src="https://www.google.com/maps/embed?..." loading="lazy"></iframe>
    </section>


    <section class="tickets" id="tickets">
        <h2>Квитки</h2>


        <div class="ticket">
            <h3>Простий квиток</h3>
            <img src="3127363.png" alt="Квиток">
            <p>Ціна: $100</p>
            <button>Купити</button>
        </div>


        <div class="ticket gold">
            <h3>Золотий квиток</h3>
            <img src="1164154.png" alt="Квиток">
            <p>Ціна: $300</p>
            <button>Купити</button>
        </div>
    </section>


    <section id="photos">
        <h2>Фото</h2>
        <div class="photo-gallery">
            <img src="o_1fg1bdnhk5ha1d07vh21pp732j1r.jpg" alt="">
            <img src="images (1).jpg" alt="">
            <img src="images.jpg" alt="">
            <img src="fullsize.jpg" alt="">
        </div>
    </section>


</main>


<footer>
    <div class="contact-info">
        <p>Email: info@bali-tour.com</p>
        <p>Телефон: +1234567890</p>
        <p>&copy; 2026 Bali Travel</p>
    </div>
</footer>


</body>
</html>
